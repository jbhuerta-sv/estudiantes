<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despega · Estudiantes asignados</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon-180.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --azul:#1F4E78; --azul-osc:#143350; --tinta:#1c2733; --gris:#5d6b7a;
    --fondo:#F2F4F7; --panel:#FFFFFF; --linea:#E1E6EC; --sinc:#9aa6b2;
    --mono:'Consolas','SF Mono',ui-monospace,monospace;
    --sans:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{font-family:var(--sans);background:var(--fondo);color:var(--tinta)}
  header{background:linear-gradient(135deg,var(--azul-osc),var(--azul));color:#fff;padding:13px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  header h1{font-size:17px;font-weight:600}
  header .sub{font-size:12px;opacity:.78;margin-top:2px}
  .kpis{display:flex;gap:12px;flex-wrap:wrap;margin-left:auto}
  .kpi{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:7px 15px;text-align:center}
  .kpi .v{font-size:20px;font-weight:700;font-family:var(--mono);line-height:1.1}
  .kpi .l{font-size:10px;text-transform:uppercase;letter-spacing:.7px;opacity:.8}

  .filterbar{background:var(--panel);border-bottom:1px solid var(--linea);padding:10px 22px;display:flex;align-items:center;gap:12px 18px;flex-wrap:wrap;position:sticky;top:0;z-index:1200}
  .fgroup{display:flex;align-items:center;gap:8px}
  .tit{font-size:11.5px;color:var(--gris);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
  select{padding:7px 11px;border:1px solid var(--linea);border-radius:8px;font-size:13px;font-family:var(--sans);background:#fff;max-width:230px}
  select:focus{outline:2px solid var(--azul);outline-offset:-1px}
  .search{flex:1;min-width:200px}
  .search input{width:100%;padding:7px 11px;border:1px solid var(--linea);border-radius:8px;font-size:13px}
  .search input:focus{outline:2px solid var(--azul);outline-offset:-1px}
  .btn-reset{border:1px solid var(--linea);background:#fff;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--gris);cursor:pointer}
  .btn-reset:hover{background:#f4f8fb}

  .main{display:flex;height:clamp(340px,52vh,560px);min-height:0}
  aside{width:300px;flex:none;background:var(--panel);border-right:1px solid var(--linea);display:flex;flex-direction:column;min-height:0}
  .listhead{padding:8px 14px;font-size:11px;color:var(--gris);text-transform:uppercase;letter-spacing:.7px;display:flex;justify-content:space-between;border-bottom:1px solid var(--linea)}
  #listaEsc{flex:1;overflow-y:auto}
  .erow{padding:8px 13px;border-bottom:1px solid #eef1f5;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .12s}
  .erow:hover{background:#f4f8fb}
  .erow.sel{background:#e9f1f9}
  .erow .dot{width:11px;height:11px;border-radius:50%;flex:none;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.13)}
  .erow .nm{flex:1;min-width:0}
  .erow .nm .t{font-size:12.5px;font-weight:600;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .erow .nm .cod{font-size:10.5px;color:var(--gris);font-family:var(--mono)}
  .erow .cnt{font-family:var(--mono);font-size:13px;font-weight:700;background:#eef1f5;color:var(--tinta);border-radius:7px;padding:3px 9px;min-width:38px;text-align:center}
  #map{flex:1;min-height:0}
  @media (max-width:760px){.main{flex-direction:column;height:auto}aside{width:100%;max-height:30vh}#map{height:clamp(300px,42vh,460px)}}
  .leaflet-popup-content{font-family:var(--sans);font-size:13px;margin:11px 15px}
  .pop-t{font-weight:700;margin-bottom:2px}
  .pop-c{font-family:var(--mono);font-size:11px;color:var(--gris);margin-bottom:6px}
  .pop-n{font-size:13px;margin-top:3px}.pop-n b{font-family:var(--mono)}
  .pop-s{font-size:11.5px;color:var(--gris);margin-top:5px}
  .pop-s div{margin:2px 0;display:flex;align-items:center;gap:6px}
  .pop-s span.d{width:9px;height:9px;border-radius:50%;display:inline-block;flex:none}
  .pop-link{display:inline-block;margin-top:8px;font-size:12px;font-weight:600;color:var(--azul);cursor:pointer;text-decoration:underline}

  .legend{position:absolute;bottom:16px;right:12px;z-index:1000;background:#fff;border:1px solid var(--linea);border-radius:9px;padding:9px 13px;font-size:12px;box-shadow:0 2px 8px rgba(20,40,60,.12)}
  .legend b{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--gris);margin-bottom:5px}
  .legend div{display:flex;align-items:center;gap:7px;margin:3px 0}
  .legend span{width:11px;height:11px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.12)}

  .seccion-tabla{padding:14px 22px 0}
  .seccion-tabla h2{font-size:14px;font-weight:700;color:var(--azul-osc);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .chip-sel{font-size:11.5px;font-weight:600;background:#e9f1f9;color:var(--azul);border:1px solid #cfe0f0;border-radius:20px;padding:3px 11px;display:none;align-items:center;gap:7px}
  .chip-sel b{font-family:var(--mono)}
  .chip-sel .x{cursor:pointer;font-weight:700;opacity:.7}.chip-sel .x:hover{opacity:1}

  .tablewrap{margin:10px 22px 22px;border:1px solid var(--linea);border-radius:10px;overflow:auto;background:var(--panel);max-height:70vh}
  table{border-collapse:collapse;font-size:12.5px;white-space:nowrap;width:100%}
  thead th{position:sticky;top:0;background:var(--azul);color:#fff;font-weight:600;padding:9px 12px;text-align:left;cursor:pointer;user-select:none;z-index:3;border-right:1px solid rgba(255,255,255,.12)}
  thead th:hover{background:#2a5d8f}
  thead th .ar{font-size:9px;opacity:.6;margin-left:3px}
  thead th.num{text-align:right}
  tbody td{padding:7px 12px;border-bottom:1px solid #eef1f5}
  tbody td.num{text-align:right;font-family:var(--mono)}
  tbody tr:hover{background:#f4f8fb}
  tbody tr:nth-child(even){background:#fafbfd}
  tbody tr:nth-child(even):hover{background:#f4f8fb}
  .est{font-weight:600;position:sticky;left:0;background:inherit;z-index:2;min-width:230px;box-shadow:1px 0 0 var(--linea)}
  thead th.est{z-index:4}
  .ce{color:var(--gris);max-width:280px;overflow:hidden;text-overflow:ellipsis}
  .fchip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600}
  .fchip span.d{width:9px;height:9px;border-radius:50%;display:inline-block}
  .hchip{font-family:var(--mono);font-size:11.5px;background:#eef1f5;border-radius:6px;padding:2px 8px}
  .empty{padding:40px;text-align:center;color:var(--gris);font-size:14px}
  .foot{padding:0 22px 22px;font-size:11.5px;color:var(--gris)}
  @media (max-width:640px){.kpis{margin-left:0;width:100%}.est{min-width:170px}}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>
<header>
  <div>
    <h1>Estudiantes seleccionados</h1>
    <div class="sub">Color del punto = fecha de la prueba · tamaño = estudiantes en el filtro · lista de estudiantes debajo del mapa</div>
  </div>
  <div class="kpis">
    <div class="kpi"><div class="v" id="kEsc">—</div><div class="l">Escuelas</div></div>

  </div>
</header>

<div class="filterbar">

  <div class="fgroup"><span class="tit">Distrito</span>
    <select id="fdist"><option value="">Todos</option></select></div>
  <div class="search"><input id="busca" type="text" placeholder="Buscar estudiante, NIE o centro…"></div>
  <button class="btn-reset" id="reset">Limpiar</button>
</div>

<div class="main">
  <aside>
    <div class="listhead"><span>Centro escolar</span><span>Estud.</span></div>
    <div id="listaEsc"></div>
  </aside>
  <div id="map" style="position:relative"></div>
</div>

<div class="seccion-tabla">
  <h2>Lista de estudiantes
    <span class="chip-sel" id="chipSel"><span>Centro: <b id="chipCod"></b></span><span class="x" id="chipX">✕</span></span>
  </h2>
</div>
<div class="tablewrap">
  <table><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
  <div class="empty" id="empty" style="display:none">Sin resultados con los filtros actuales.</div>
</div>
<div class="foot" id="foot"></div>

NTE","nie":20017885,"cod":12017,"ce":"CENTRO ESCOLAR NEMESIA LUNA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"MEJÍA ESCOBAR JOSÉ REYNALDO","nie":19970311,"cod":12017,"ce":"CENTRO ESCOLAR NEMESIA LUNA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"ESCOBAR CANALES DANIEL ANTONIO","nie":20185263,"cod":12051,"ce":"CENTRO ESCOLAR CENTRO AMERICA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"GUIDOS HERNÁNDEZ ASHLY TATIANA","nie":20018407,"cod":12051,"ce":"CENTRO ESCOLAR CENTRO AMERICA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"MOLINA BERNAL DIEGO VLADIMIR","nie":20015661,"cod":12051,"ce":"CENTRO ESCOLAR CENTRO AMERICA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"VENTURA PINEDA ANDERSON DAVID","nie":20018670,"cod":12051,"ce":"CENTRO ESCOLAR CENTRO AMERICA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"CORNEJO RIVAS FERNANDA DE LOS ÁNGELES","nie":19972780,"cod":12061,"ce":"CENTRO ESCOLAR 14 DE ABRIL","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"BLANCO FLAMENCO ASHLEY ALEJANDRA","nie":19984494,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"GARCIA LOPEZ AXEL ADONAY","nie":19859222,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"GARCIA RIVERA NAHOMY GABRIELA","nie":19859227,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"GONZALEZ JIMENEZ HELEN ANDREA","nie":19859248,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"MIRANDA SANTOS DANIELA MARGARITA","nie":20090344,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"RAMOS LOPEZ CAMILA ALEXANDRA","nie":19863932,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"REYES ARGUETA LUCIA NICOLLE","nie":19895992,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"RIVAS RECINOS GENESIS CLARISSA","nie":19863943,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"TORRES LOPEZ NAHOMY SARAI","nie":19864016,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"VALENCIA CARBAJAL SUSANA ELIZABETH","nie":19864018,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"VASQUEZ AYALA ALISSON ABIGAIL","nie":20091728,"cod":13713,"ce":"CENTRO ESCOLAR URBANIZACION LAS MARGARITAS","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"SANCHEZ FRANCO OMAR EZEQUIEL","nie":19982675,"cod":70080,"ce":"CENTRO ESCOLAR CANTON EL GUAJE","sec":1,"f":"2026-07-02","h":"PM-1:00-4:30"},{"est":"ARAUJO PÉREZ EMILY GUADALUPE","nie":19927988,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"ARDÓN LÓPEZ PABLO MATEO","nie":19889728,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"CALLES RIVAS ERIKA VALERIA","nie":19927993,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"CAMPOS AYALA JAVIER EDUARDO","nie":19927995,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"CHACÓN ELÍAS SAIRA MELISSA","nie":19928000,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"CORVERA IRAHETA LIZANDRO ALBERTO","nie":20076543,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"DÍAZ MONTECINOS FÁTIMA GUADALUPE","nie":5583290,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"FLORES REYES GRACIA ABIGAIL","nie":5583267,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"GARCÍA RODRÍGUEZ ANDREA JAMILETH","nie":19928023,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"GUARDADO VELÁSQUEZ ADELA FERNANDA","nie":19928027,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"MATUS MARTÍNEZ JULIO CÉSAR","nie":19873956,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"MORALES AGUILLÓN PATRICIA FABIOLA","nie":20120493,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"MORENO VALENCIA DANNY DE JESÚS","nie":19928046,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"ORELLANA LOURDES GUADALUPE","nie":19928049,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"PÉREZ GÓMEZ CÉSAR MAURICIO","nie":20113028,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"},{"est":"RECINOS MANCÍA ELIZABETH NICOLE","nie":19928056,"cod":88036,"ce":"COMPLEJO EDUCATIVO CATÓLICO SANTA CATALINA","sec":1,"f":"2026-07-02","h":"AM-9:00-12:30"}];
const FCOL = {"2026-06-29": "#1F77B4", "2026-06-30": "#E69F00", "2026-07-01": "#2E9E5B", "2026-07-02": "#9B59B6"};
const FLAB = {"2026-06-29": "lun 29 jun", "2026-06-30": "mar 30 jun", "2026-07-01": "mié 1 jul", "2026-07-02": "jue 2 jul"};
const HOR  = ["AM-9:00-12:30", "PM-1:00-4:30"];
const FECHAS = ["2026-06-29", "2026-06-30", "2026-07-01", "2026-07-02"];

let fFecha='', fHorario='', fDist='', q='', selCod=null, sortCol='est', sortDir=1;
const marcadores={};

/* ---------- MAPA ---------- */
const map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
map.fitBounds(ESC.map(s=>[s.lat,s.lng]),{padding:[28,28]});

const leg=L.control({position:'bottomright'});
leg.onAdd=()=>{const d=L.DomUtil.create('div','legend');
  let h='<b>Fecha de prueba</b>';
  FECHAS.forEach(f=>{h+=`<div><span style="background:${FCOL[f]}"></span> ${FLAB[f]}</div>`;});
  d.innerHTML=h;return d;};
leg.addTo(map);

function escFecha(s){return s.ses[0].f;}                 // cada escuela = una sola fecha
function radio(n){return n===0?5:Math.max(6,Math.min(22,4+Math.sqrt(n)*2.6));}
// estudiantes de la escuela que pasan el filtro fecha+horario
function cuentaEsc(s){
  let t=0;
  s.ses.forEach(x=>{ if(fFecha&&x.f!==fFecha)return; if(fHorario&&x.h!==fHorario)return; t+=x.k; });
  return t;
}
function escVisible(s){
  if(fFecha && escFecha(s)!==fFecha) return false;
  if(fDist && s.dist!==fDist) return false;
  return true;
}

ESC.forEach(s=>{
  const m=L.circleMarker([s.lat,s.lng],{radius:8,weight:1.4,color:'#fff',fillColor:FCOL[escFecha(s)],fillOpacity:.9});
  m.addTo(map); marcadores[s.c]=m;
  m.on('click',()=>{ selCod=s.c; render(); openPop(s); document.querySelector('.tablewrap').scrollIntoView({behavior:'smooth',block:'start'}); });
});

function openPop(s){
  const m=marcadores[s.c]; if(!m)return;
  const n=cuentaEsc(s);
  let ses='';
  s.ses.forEach(x=>{ if(fFecha&&x.f!==fFecha)return; if(fHorario&&x.h!==fHorario)return;
    ses+=`<div><span class="d" style="background:${FCOL[x.f]}"></span>${FLAB[x.f]} · ${x.h} · <b>${x.k}</b></div>`; });
  m.bindPopup(`<div class="pop-t">${s.n}</div><div class="pop-c">Código ${s.c} · ${s.dist}</div>`+
    `<div class="pop-n">En el filtro: <b>${n}</b> de ${s.tot} estudiantes</div>`+
    (ses?`<div class="pop-s">${ses}</div>`:'')+
    `<div class="pop-link" onclick="verEstudiantes(${s.c})">Ver estudiantes ▾</div>`).openPopup();
}
window.verEstudiantes=function(c){ selCod=c; render(); document.querySelector('.tablewrap').scrollIntoView({behavior:'smooth',block:'start'}); };

/* ---------- TABLA ---------- */
const COLS=[
  ['est','Estudiante','txt',r=>r.est],
  ['nie','NIE','num',r=>r.nie],
  ['cod','Código','num',r=>r.cod],
  ['ce','Centro educativo','txt',r=>r.ce],
  ['sec','Sección','num',r=>r.sec],
  ['f','Fecha','fecha',r=>r.f],
  ['h','Horario','hor',r=>r.h],
];
const thead=document.getElementById('thead');
COLS.forEach(([k,lab,tipo])=>{const th=document.createElement('th');th.textContent=lab;
  if(tipo==='num')th.classList.add('num');
  if(k==='est')th.classList.add('est');
  th.dataset.k=k; th.innerHTML+=' <span class="ar" id="ar-'+k+'"></span>';
  th.onclick=()=>{if(sortCol===k)sortDir*=-1;else{sortCol=k;sortDir=1;}render();};thead.appendChild(th);});

function filtraEst(){
  return EST.filter(r=>{
    if(fFecha && r.f!==fFecha) return false;
    if(fHorario && r.h!==fHorario) return false;
    if(selCod && r.cod!==selCod) return false;
    if(fDist){ const e=ESC.find(x=>x.c===r.cod); if(!e||e.dist!==fDist) return false; }
    if(q && !((r.est+' '+r.nie+' '+r.ce).toLowerCase().includes(q))) return false;
    return true;
  });
}

function render(){
  /* --- mapa --- */
  let escMostradas=0, estTot=0; const escItems=[];
  ESC.forEach(s=>{
    const m=marcadores[s.c];
    if(!escVisible(s)){ if(m)m.setStyle({opacity:.12,fillOpacity:.06}); return; }
    const n=cuentaEsc(s);
    if(n===0 && (fFecha||fHorario||fDist)){ if(m)m.setStyle({opacity:.25,fillOpacity:.12}); return; }
    escMostradas++; estTot+=n; escItems.push({s,n});
    if(m){ m.setStyle({opacity:1,fillOpacity:.9,fillColor:FCOL[escFecha(s)]}); m.setRadius(radio(n)); }
  });
  document.getElementById('kEsc').textContent=escMostradas;
  document.getElementById('kEst').textContent=estTot.toLocaleString('es-SV');

  /* --- lista de escuelas (barra lateral) --- */
  escItems.sort((a,b)=>b.n-a.n||a.s.n.localeCompare(b.s.n,'es'));
  const le=document.getElementById('listaEsc'); le.innerHTML='';
  const fr=document.createDocumentFragment();
  escItems.forEach(({s,n})=>{
    const div=document.createElement('div');
    div.className='erow'+(selCod===s.c?' sel':''); div.dataset.c=s.c;
    div.innerHTML=`<span class="dot" style="background:${FCOL[escFecha(s)]}"></span>`+
      `<div class="nm"><div class="t">${s.n}</div><div class="cod">${s.c} · ${s.dist}</div></div>`+
      `<span class="cnt">${n}</span>`;
    div.onclick=()=>{ selCod=s.c; render(); openPop(s);
      map.setView([s.lat,s.lng],Math.max(map.getZoom(),13),{animate:true}); };
    fr.appendChild(div);
  });
  le.appendChild(fr);

  /* --- chip de selección --- */
  const chip=document.getElementById('chipSel');
  if(selCod){ const e=ESC.find(x=>x.c===selCod);
    document.getElementById('chipCod').textContent=selCod+(e?' · '+e.n:'');
    chip.style.display='inline-flex';
  } else chip.style.display='none';

  /* --- tabla --- */
  let rows=filtraEst();
  const acc=Object.fromEntries(COLS.map(c=>[c[0],c[3]]));
  rows.sort((a,b)=>{let va=acc[sortCol](a),vb=acc[sortCol](b);
    if(va===null)va=-Infinity;if(vb===null)vb=-Infinity;
    if(typeof va==='string')return sortDir*va.localeCompare(vb,'es');
    return sortDir*(va-vb);});
  COLS.forEach(([k])=>{const ar=document.getElementById('ar-'+k);if(ar)ar.textContent=sortCol===k?(sortDir>0?'▲':'▼'):'';});
  const tb=document.getElementById('tbody');tb.innerHTML='';
  const frag=document.createDocumentFragment();
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    COLS.forEach(([k,lab,tipo,fn])=>{
      const td=document.createElement('td');const v=fn(r);
      if(k==='est')td.className='est';
      else if(k==='ce')td.className='ce';
      else if(tipo==='num')td.className='num';
      if(k==='f'){ td.innerHTML=`<span class="fchip"><span class="d" style="background:${FCOL[v]}"></span>${FLAB[v]}</span>`; }
      else if(k==='h'){ td.innerHTML=`<span class="hchip">${v}</span>`; }
      else if(tipo==='txt'){td.textContent=v;td.title=v;}
      else td.textContent=v===null?'—':v;
      tr.appendChild(td);
    });
    frag.appendChild(tr);
  });
  tb.appendChild(frag);
  document.getElementById('empty').style.display=rows.length?'none':'block';
  document.getElementById('foot').textContent=
    `${rows.length.toLocaleString('es-SV')} de ${EST.length.toLocaleString('es-SV')} estudiantes`+
    (fFecha?` · ${FLAB[fFecha]}`:'')+(fHorario?` · ${fHorario}`:'')+(fDist?` · ${fDist}`:'')+(selCod?` · centro ${selCod}`:'');
}

/* ---------- POBLAR SELECTS ---------- */
const selF=document.getElementById('ffecha');
FECHAS.forEach(f=>{const o=document.createElement('option');o.value=f;o.textContent=FLAB[f];selF.appendChild(o);});
const selH=document.getElementById('fhorario');
HOR.forEach(h=>{const o=document.createElement('option');o.value=h;o.textContent=h;selH.appendChild(o);});
const selD=document.getElementById('fdist');
[...new Set(ESC.map(s=>s.dist))].sort((a,b)=>a.localeCompare(b,'es')).forEach(d=>{const o=document.createElement('option');o.value=d;o.textContent=d;selD.appendChild(o);});

/* ---------- EVENTOS ---------- */
selF.addEventListener('change',e=>{fFecha=e.target.value;render();});
selH.addEventListener('change',e=>{fHorario=e.target.value;render();});
selD.addEventListener('change',e=>{fDist=e.target.value;render();});
document.getElementById('busca').addEventListener('input',e=>{q=e.target.value.trim().toLowerCase();render();});
document.getElementById('chipX').addEventListener('click',()=>{selCod=null;render();});
document.getElementById('reset').addEventListener('click',()=>{
  fFecha='';fHorario='';fDist='';q='';selCod=null;
  selF.value='';selH.value='';selD.value='';document.getElementById('busca').value='';render();
});
render();
setTimeout(()=>map.invalidateSize(),60);
window.addEventListener('resize',()=>map.invalidateSize());
</script>
