<style>

  .sw input{position:absolute;opacity:0}
  .sw .pill{width:34px;height:19px;border-radius:10px;background:#c8d1da;position:relative;transition:background .15s;flex:none}
  .sw .pill::after{content:'';position:absolute;top:2.5px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.25)}

  .sw input:checked + .pill::after{left:17px}
  .hint{font-size:12px;color:var(--gris)}

  #map{flex:1;min-height:0}

</style>

// indices g[]: 0=Sin prueba,1=<40,2=≥40,3=≥45,4=≥50,5=≥55,6=≥60,7=≥65,8=≥70,9=≥75,10=≥80
const FILTROS = ['Todos','≥40','≥45','≥50','≥55','≥60','≥65','≥70','≥75','≥80'];
const FIDX =     [0,        2,    3,    4,    5,    6,    7,    8,    9,    10]; // indice minimo en g[] para cada filtro
let fSel=0, soloApto=false, filaSel=null, marcadores={};
const map=L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
const conC=DATA.filter(s=>s.lat!==null);
map.fitBounds(conC.map(s=>[s.lat,s.lng]),{padding:[28,28]});
const leg=L.control({position:'bottomright'});
leg.onAdd=()=>{const d=L.DomUtil.create('div','legend');
  d.innerHTML='<div><span style="background:var(--verde)"></span> Con estudiantes en el rango</div>'+
              '<div><span style="background:var(--rojo)"></span> Sin estudiantes en el rango</div>';return d;};
leg.addTo(map);
function arr(s){return soloApto?s.ga:s.g;}
function enRango(s){const a=arr(s);
  if(fSel===0){ let t=0; for(let i=1;i<11;i++) t+=a[i]; return t; } // Todos = con prueba (excluye Sin prueba idx0)
  let t=0; for(let i=FIDX[fSel];i<11;i++) t+=a[i]; return t;
}
function totalEsc(s){const a=arr(s);let t=0;for(let i=1;i<11;i++)t+=a[i];return t;} // con prueba
function baseTotal(){return DATA.reduce((a,s)=>a+enRango(s),0);}
function radio(n){return n===0?5:Math.max(6,Math.min(20,4+Math.sqrt(n)*2.4));}
conC.forEach(s=>{const m=L.circleMarker([s.lat,s.lng],{radius:8,weight:1.4,color:'#fff',fillColor:'#2E9E5B',fillOpacity:.88});
  m.addTo(map);m.on('click',()=>selecciona(s.c,false));marcadores[s.c]=m;});
function render(){
  let estTot=0,escOk=0,escNo=0;const items=[];
  DATA.forEach(s=>{const n=enRango(s);estTot+=n;n>0?escOk++:escNo++;items.push({s,n});
    const m=marcadores[s.c];
    if(m){m.setStyle({fillColor:n>0?'#2E9E5B':'#D64545'});m.setRadius(radio(n));
      m.bindPopup(`<div class="pop-t">${s.n}</div><div class="pop-c">Código ${s.c}</div>`+
        `<div class="pop-n">En el rango <b>${fSel===0?'(con prueba)':FILTROS[fSel]}</b>: `+
        `<b>${n}</b> de ${totalEsc(s)} estudiantes${soloApto?' aptos':''}</div>`);}});
  const base=baseTotal();
  document.getElementById('cEsc').textContent=DATA.length;
  document.getElementById('cEscOk').textContent=escOk;
  document.getElementById('cEscNo').textContent=escNo;
  document.getElementById('cEst').textContent=estTot.toLocaleString('es-SV');
  document.getElementById('cBase').textContent=base.toLocaleString('es-SV');
  document.getElementById('cPct').textContent=base?(100*estTot/base).toFixed(1)+'%':'—';
  const sufA=soloApto?' · solo edad permitida':'';
  document.getElementById('hint').textContent=(fSel===0?`Mostrando ${estTot.toLocaleString('es-SV')} estudiantes con Prueba 9`:`Estudiantes con nota ${FILTROS[fSel]} en la Prueba 9`)+sufA;
  const q=document.getElementById('busca').value.trim().toLowerCase();
  items.sort((a,b)=>b.n-a.n||a.s.n.localeCompare(b.s.n));
  const cont=document.getElementById('lista');cont.innerHTML='';
  items.forEach(({s,n})=>{
    if(q&&!(s.n.toLowerCase().includes(q)||String(s.c).includes(q)))return;
    const div=document.createElement('div');div.className='row'+(n===0?' cero':'')+(filaSel===s.c?' sel':'');div.dataset.c=s.c;
    div.innerHTML=`<span class="dot"></span><div class="nm"><div class="t">${s.n}</div><div class="cod">${s.c}</div></div><span class="cnt">${n}</span>`;
    div.onclick=()=>selecciona(s.c,true);cont.appendChild(div);});
}
function selecciona(c,zoom){filaSel=c;
  document.querySelectorAll('.row').forEach(r=>r.classList.toggle('sel',+r.dataset.c===c));
  const s=DATA.find(x=>x.c===c),m=marcadores[c];
  if(m){if(zoom)map.setView([s.lat,s.lng],Math.max(map.getZoom(),14),{animate:true});m.openPopup();}
  const fila=document.querySelector(`.row[data-c="${c}"]`);if(fila)fila.scrollIntoView({block:'nearest'});}
const rail=document.getElementById('rail');
FILTROS.forEach((f,i)=>{const b=document.createElement('button');b.textContent=f;if(i===0)b.classList.add('act');
  b.onclick=()=>{fSel=i;rail.querySelectorAll('button').forEach((x,j)=>x.classList.toggle('act',j===i));render();};rail.appendChild(b);});
document.getElementById('busca').addEventListener('input',render);
document.getElementById('apto').addEventListener('change',e=>{soloApto=e.target.checked;render();});
render();
</script>
</body>
