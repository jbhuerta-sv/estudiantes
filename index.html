<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despega · Tablero de clasificación y grupos territoriales</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root{
    --azul:#1F4E78; --azul-osc:#143350; --tinta:#1c2733; --gris:#5d6b7a;
    --verde:#2E9E5B; --verde-suave:#E3F4EA; --rojo:#D64545; --rojo-suave:#FBE9E9;
    --fondo:#F2F4F7; --panel:#FFFFFF; --linea:#E1E6EC;
    --g1:#1F77B4; --g2:#2E9E5B; --g3:#E69F00; --g4:#9467BD; --g0:#8a97a5;
    --mono:'Consolas','SF Mono',ui-monospace,monospace;
    --sans:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;font-family:var(--sans);background:var(--fondo);color:var(--tinta)}
  body{display:flex;flex-direction:column}

  header{background:linear-gradient(135deg,var(--azul-osc),var(--azul));color:#fff;
    padding:14px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  header h1{font-size:17px;font-weight:600;letter-spacing:.2px}
  header .sub{font-size:12px;opacity:.75;font-weight:400}
  .cards{display:flex;gap:14px;margin-left:auto;flex-wrap:wrap}
  .card{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);
    border-radius:10px;padding:8px 16px;min-width:150px}
  .card .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;opacity:.8}
  .card .val{font-size:22px;font-weight:700;font-family:var(--mono);line-height:1.2}
  .card .det{font-size:11px;opacity:.85}
  .card .det b.ok{color:#9fe7bc} .card .det b.bad{color:#ffb3b3}

  .filterbar{background:var(--panel);border-bottom:1px solid var(--linea);
    padding:10px 22px;display:flex;align-items:center;gap:14px 22px;flex-wrap:wrap}
  .fgroup{display:flex;align-items:center;gap:10px}
  .filterbar .tit{font-size:12px;color:var(--gris);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
  .rail{display:flex;border:1px solid var(--linea);border-radius:9px;overflow:hidden}
  .rail button{border:none;background:#fff;padding:8px 14px;font-size:13px;font-weight:600;
    color:var(--gris);cursor:pointer;border-right:1px solid var(--linea);font-family:var(--mono);
    transition:background .15s,color .15s}
  .rail button:last-child{border-right:none}
  .rail button:hover{background:#f0f6f2}
  .rail button.act{background:var(--verde);color:#fff}
  .rail button:focus-visible{outline:2px solid var(--azul);outline-offset:-2px}

  /* chips de grupo territorial (multi-seleccion) */
  .gchips{display:flex;gap:7px;flex-wrap:wrap}
  .gchip{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--cc);
    color:var(--cc);background:#fff;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;
    cursor:pointer;user-select:none;transition:background .14s,color .14s,opacity .14s}
  .gchip::before{content:'';width:10px;height:10px;border-radius:50%;background:var(--cc)}
  .gchip.on{background:var(--cc);color:#fff}
  .gchip.on::before{background:#fff}
  .gchip:not(.on){opacity:.55}

  .sw{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:600;color:var(--tinta);
    cursor:pointer;user-select:none;letter-spacing:.3px}
  .sw input{position:absolute;opacity:0}
  .sw .pill{width:34px;height:19px;border-radius:10px;background:#c8d1da;position:relative;transition:background .15s;flex:none}
  .sw .pill::after{content:'';position:absolute;top:2.5px;left:3px;width:14px;height:14px;border-radius:50%;
    background:#fff;transition:left .15s;box-shadow:0 1px 2px rgba(0,0,0,.25)}
  .sw input:checked + .pill{background:var(--azul)}
  .sw input:checked + .pill::after{left:17px}
  .sw input:focus-visible + .pill{outline:2px solid var(--azul);outline-offset:2px}
  .hint{font-size:12px;color:var(--gris);width:100%}

  /* fila compacta de resumen por grupo */
  .gsummary{display:flex;gap:8px;padding:7px 22px;background:var(--panel);
    border-bottom:1px solid var(--linea);flex-wrap:wrap}
  .gmini{flex:1;min-width:120px;border-left:4px solid var(--cc);background:var(--fondo);
    border-radius:7px;padding:5px 11px;cursor:pointer;transition:opacity .14s,background .14s}
  .gmini:hover{background:#fff}
  .gmini.off{opacity:.4}
  .gmini .gt{font-size:11px;font-weight:700;color:var(--cc);text-transform:uppercase;letter-spacing:.5px;
    display:flex;align-items:center;gap:6px;line-height:1.4}
  .gmini .gt::before{content:'';width:9px;height:9px;border-radius:50%;background:var(--cc);flex:none}
  .gmini .gn{font-size:10px;color:var(--gris);margin:0 0 2px 15px}
  .gmini .gv{display:flex;gap:14px;margin-left:15px}
  .gmini .gv b{font-family:var(--mono);font-size:16px;font-weight:700}
  .gmini .gv s{font-size:9.5px;color:var(--gris);text-transform:uppercase;letter-spacing:.4px;text-decoration:none;display:block}
  .gmini.total{border-left-color:var(--azul)}
  .gmini.total .gt{color:var(--azul)} .gmini.total .gt::before{background:var(--azul)}

  .main{flex:1;display:flex;min-height:0}
  aside{width:330px;background:var(--panel);border-right:1px solid var(--linea);
    display:flex;flex-direction:column;min-height:0}
  .search{padding:10px 14px;border-bottom:1px solid var(--linea)}
  .search input{width:100%;padding:8px 11px;border:1px solid var(--linea);border-radius:8px;font-size:13px}
  .search input:focus{outline:2px solid var(--azul);outline-offset:-1px}
  .listhead{padding:7px 16px;font-size:11px;color:var(--gris);text-transform:uppercase;
    letter-spacing:.7px;display:flex;justify-content:space-between;border-bottom:1px solid var(--linea)}
  #lista{flex:1;overflow-y:auto}
  .row{padding:9px 14px;border-bottom:1px solid #eef1f5;display:flex;align-items:center;gap:10px;
    cursor:pointer;transition:background .12s}
  .row:hover{background:#f4f8fb}
  .row.sel{background:#e9f1f9}
  .row .dot{width:10px;height:10px;border-radius:50%;flex:none;border:1.5px solid #fff;box-shadow:0 0 0 1px rgba(0,0,0,.12)}
  .row.cero{opacity:.5}
  .row .nm{flex:1;min-width:0}
  .row .nm .t{font-size:12.5px;font-weight:600;line-height:1.25;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .row .nm .cod{font-size:10.5px;color:var(--gris);font-family:var(--mono)}
  .row .cnt{font-family:var(--mono);font-size:13px;font-weight:700;background:var(--verde-suave);
    color:#1c6e41;border-radius:7px;padding:3px 9px;min-width:42px;text-align:center}
  .row.cero .cnt{background:var(--rojo-suave);color:var(--rojo)}

  #map{flex:1;min-height:0}
  .leaflet-popup-content{font-family:var(--sans);font-size:13px;margin:12px 16px}
  .pop-t{font-weight:700;margin-bottom:2px}
  .pop-c{font-family:var(--mono);font-size:11px;color:var(--gris);margin-bottom:6px}
  .pop-g{display:inline-block;font-size:11px;font-weight:700;color:#fff;border-radius:6px;padding:2px 8px;margin-bottom:5px}
  .pop-n b{font-family:var(--mono)}

  .legend{position:absolute;bottom:18px;right:12px;z-index:1000;background:#fff;
    border:1px solid var(--linea);border-radius:9px;padding:9px 13px;font-size:12px;
    box-shadow:0 2px 8px rgba(20,40,60,.12)}
  .legend div{display:flex;align-items:center;gap:7px;margin:2px 0}
  .legend span{width:10px;height:10px;border-radius:50%;display:inline-block;border:1px solid rgba(0,0,0,.15)}

  @media (max-width:820px){
    .main{flex-direction:column}
    aside{width:100%;max-height:36vh}
    .cards{margin-left:0}
  }
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div>
    <h1>Programa Despega · Clasificación y grupos territoriales</h1>
    <div class="sub">Color = grupo territorial · tamaño = estudiantes en el rango · rojo = sin estudiantes en el filtro</div>
  </div>
  <div class="cards">
    <div class="card">
      <div class="lbl">Escuelas</div>
      <div class="val" id="cEsc">—</div>
      <div class="det"><b class="ok" id="cEscOk">—</b> con estudiantes · <b class="bad" id="cEscNo">—</b> sin</div>
    </div>
    <div class="card">
      <div class="lbl">Estudiantes en el filtro</div>
      <div class="val" id="cEst">—</div>
      <div class="det"><b id="cPct">—</b> del total (<span id="cBase">—</span>)</div>
    </div>
  </div>
</header>

<div class="filterbar">
  <div class="fgroup">
    <span class="tit">Rango (acumulado)</span>
    <div class="rail" id="rail" role="tablist" aria-label="Filtro por rango"></div>
  </div>
  <div class="fgroup">
    <span class="tit">Grupo territorial</span>
    <div class="gchips" id="gchips"></div>
  </div>
  <label class="sw"><input type="checkbox" id="apto"><span class="pill"></span>EDAD PERMITIDA (APTO=SI)</label>
  <span class="hint" id="hint"></span>
</div>

<div class="gsummary" id="gsummary"></div>

<div class="main">
  <aside>
    <div class="search"><input id="busca" type="text" placeholder="Buscar escuela o código…" aria-label="Buscar escuela"></div>
    <div class="listhead"><span>Centro escolar</span><span>Estudiantes</span></div>
    <div id="lista"></div>
  </aside>
  <div id="map" style="position:relative"></div>
</div>

const FILTROS = ['Todos','≥50','≥55','≥60','≥65','≥70','≥75','≥80'];
const GCOL = ['#1F77B4','#2E9E5B','#E69F00','#9467BD'];
const GNOM = ['G1 · Centro-Oeste','G2 · Norte','G3 · Este','G4 · Sur'];
const GNEU = '#8a97a5';
let fSel = 0, soloApto = false, gOn = [true,true,true,true], filaSel = null, marcadores = {};

const map = L.map('map');
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap',maxZoom:18}).addTo(map);
const conCoords = DATA.filter(s=>s.lat!==null);
map.fitBounds(conCoords.map(s=>[s.lat,s.lng]),{padding:[28,28]});

const leg = L.control({position:'bottomright'});
leg.onAdd = ()=>{
  const d = L.DomUtil.create('div','legend');
  d.innerHTML = GCOL.map((c,i)=>`<div><span style="background:${c}"></span> ${GNOM[i]}</div>`).join('')
    + `<div><span style="background:var(--rojo)"></span> Sin estudiantes en el filtro</div>`;
  return d;
};
leg.addTo(map);

function arr(s){ return soloApto ? s.ga : s.g; }
function enRango(s){ const a=arr(s); let t=0; for(let i=Math.max(fSel,0);i<8;i++){ if(fSel===0||i>=fSel) t+=a[i]; } return t; }
function totalEsc(s){ return arr(s).reduce((a,b)=>a+b,0); }
function grupoVisible(s){ return s.gt===null ? true : gOn[s.gt]; }
function baseTotal(){ return DATA.reduce((a,s)=> a + (grupoVisible(s)? totalEsc(s):0), 0); }
function radio(n){ return n===0 ? 5 : Math.max(6, Math.min(20, 4+Math.sqrt(n)*2.4)); }
function colorBase(s){ return s.gt===null ? GNEU : GCOL[s.gt]; }

conCoords.forEach(s=>{
  const m = L.circleMarker([s.lat,s.lng],{radius:8,weight:1.4,color:'#fff',fillColor:colorBase(s),fillOpacity:.9});
  m.addTo(map);
  m.on('click',()=> selecciona(s.c, false));
  marcadores[s.c]=m;
});

// fila de resumen por grupo (construir una vez)
const gsum = document.getElementById('gsummary');
const ZONA = ['Centro-Oeste (San Salvador)','Norte (Apopa-Aguilares)','Este (Soyapango-Ilopango)','Sur (La Paz-Olocuilta)'];
[0,1,2,3].forEach(k=>{
  const d = document.createElement('div');
  d.className='gmini'; d.style.setProperty('--cc',GCOL[k]); d.dataset.g=k;
  d.innerHTML = `<div class="gt">Grupo ${k+1}</div><div class="gn">${ZONA[k]}</div>`+
    `<div class="gv"><div><b id="ge${k}">—</b><s>Escuelas</s></div><div><b id="gn${k}">—</b><s>Estudiantes</s></div></div>`;
  d.onclick = ()=>{ gOn[k]=!gOn[k]; document.querySelectorAll('.gchip')[k].classList.toggle('on',gOn[k]); render(); };
  gsum.appendChild(d);
});
const dt = document.createElement('div');
dt.className='gmini total';
dt.innerHTML = `<div class="gt">Total</div><div class="gn">Grupos visibles</div>`+
  `<div class="gv"><div><b id="geT">—</b><s>Escuelas</s></div><div><b id="gnT">—</b><s>Estudiantes</s></div></div>`;
gsum.appendChild(dt);

function render(){
  let estTot=0, escOk=0, escNo=0;
  const items=[];
  const gAcum=[{e:0,n:0},{e:0,n:0},{e:0,n:0},{e:0,n:0}];
  DATA.forEach(s=>{
    const vis = grupoVisible(s);
    const n = vis ? enRango(s) : 0;
    const m = marcadores[s.c];
    if(!vis){
      if(m){ m.setStyle({opacity:.15,fillOpacity:.08}); }
      return;
    }
    estTot += n;
    n>0 ? escOk++ : escNo++;
    gAcum[s.gt].e += 1; gAcum[s.gt].n += n;
    items.push({s,n});
    if(m){
      m.setStyle({opacity:1, fillOpacity:.9, fillColor: n>0? colorBase(s) : '#D64545'});
      m.setRadius(radio(n));
      const gtxt = GNOM[s.gt]; const gc = GCOL[s.gt];
      m.bindPopup(`<div class="pop-t">${s.n}</div><div class="pop-c">Código ${s.c}</div>`+
        `<div class="pop-g" style="background:${gc}">${gtxt}</div>`+
        `<div class="pop-n">En el rango <b>${fSel===0?'(todos)':FILTROS[fSel]}</b>: `+
        `<b>${n}</b> de ${totalEsc(s)} estudiantes${soloApto?' aptos':''}</div>`);
    }
  });
  // mini-fichas por grupo
  let tE=0,tN=0;
  for(let k=0;k<4;k++){
    document.getElementById('ge'+k).textContent = gAcum[k].e;
    document.getElementById('gn'+k).textContent = gAcum[k].n.toLocaleString('es-SV');
    document.querySelectorAll('.gmini')[k].classList.toggle('off', !gOn[k]);
    if(gOn[k]){ tE+=gAcum[k].e; tN+=gAcum[k].n; }
  }
  document.getElementById('geT').textContent = tE;
  document.getElementById('gnT').textContent = tN.toLocaleString('es-SV');
  const base = baseTotal();
  document.getElementById('cEsc').textContent = items.length;
  document.getElementById('cEscOk').textContent = escOk;
  document.getElementById('cEscNo').textContent = escNo;
  document.getElementById('cEst').textContent = estTot.toLocaleString('es-SV');
  document.getElementById('cBase').textContent = base.toLocaleString('es-SV');
  document.getElementById('cPct').textContent = base? (100*estTot/base).toFixed(1)+'%' : '—';
  const ng = gOn.filter(Boolean).length;
  const sufG = ng<4 ? ` · grupos ${gOn.map((v,i)=>v?i+1:null).filter(x=>x).join(', ')}` : '';
  const sufA = soloApto ? ' · solo edad permitida (15a–16a 2m)' : '';
  document.getElementById('hint').textContent = (fSel===0
    ? `Mostrando ${estTot.toLocaleString('es-SV')} estudiantes`
    : `Estudiantes que alcanzan ${FILTROS[fSel]} con 90% de confianza`) + sufG + sufA;

  const q = document.getElementById('busca').value.trim().toLowerCase();
  items.sort((a,b)=> b.n-a.n || a.s.n.localeCompare(b.s.n));
  const cont = document.getElementById('lista'); cont.innerHTML='';
  items.forEach(({s,n})=>{
    if(q && !(s.n.toLowerCase().includes(q) || String(s.c).includes(q))) return;
    const div = document.createElement('div');
    div.className = 'row'+(n===0?' cero':'')+(filaSel===s.c?' sel':'');
    div.dataset.c = s.c;
    const dotc = n>0 ? colorBase(s) : '#D64545';
    div.innerHTML = `<span class="dot" style="background:${dotc}"></span>`+
      `<div class="nm"><div class="t">${s.n}</div><div class="cod">${s.c}</div></div>`+
      `<span class="cnt">${n}</span>`;
    div.onclick = ()=> selecciona(s.c, true);
    cont.appendChild(div);
  });
}

function selecciona(c, zoom){
  filaSel = c;
  document.querySelectorAll('.row').forEach(r=>r.classList.toggle('sel', +r.dataset.c===c));
  const s = DATA.find(x=>x.c===c), m = marcadores[c];
  if(m){ if(zoom && s.lat!==null) map.setView([s.lat,s.lng], Math.max(map.getZoom(),14),{animate:true}); m.openPopup(); }
  const fila = document.querySelector(`.row[data-c="${c}"]`);
  if(fila) fila.scrollIntoView({block:'nearest'});
}

// rail de rangos
const rail = document.getElementById('rail');
FILTROS.forEach((f,i)=>{
  const b = document.createElement('button'); b.textContent=f; b.setAttribute('role','tab');
  if(i===0) b.classList.add('act');
  b.onclick = ()=>{ fSel=i; rail.querySelectorAll('button').forEach((x,j)=>x.classList.toggle('act',j===i)); render(); };
  rail.appendChild(b);
});

// chips de grupo (multi-seleccion, los 4 activos por defecto)
const gc = document.getElementById('gchips');
GNOM.forEach((nom,i)=>{
  const b = document.createElement('div');
  b.className='gchip on'; b.style.setProperty('--cc',GCOL[i]);
  b.textContent = 'Grupo '+(i+1);
  b.onclick = ()=>{ gOn[i]=!gOn[i]; b.classList.toggle('on',gOn[i]); render(); };
  gc.appendChild(b);
});

document.getElementById('busca').addEventListener('input', render);
document.getElementById('apto').addEventListener('change', e=>{ soloApto=e.target.checked; render(); });
render();
</script>
</body>
</html>
