<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despega · Consulta de estudiantes (selección final)</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon-180.png">

<style>

    --sans:'Segoe UI',system-ui,-apple-system,Roboto,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;font-family:var(--sans);background:var(--fondo);color:var(--tinta)}
  body{display:flex;flex-direction:column}
  header{background:linear-gradient(135deg,var(--azul-osc),var(--azul));color:#fff;padding:14px 22px;display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  header h1{font-size:17px;font-weight:600}
  header .sub{font-size:12px;opacity:.75}
  .navbtn{display:inline-flex;align-items:center;gap:7px;text-decoration:none;background:rgba(255,255,255,.14);
    border:1px solid rgba(255,255,255,.30);color:#fff;font-size:12.5px;font-weight:600;padding:8px 15px;border-radius:9px;
    white-space:nowrap;transition:background .15s,transform .12s;margin-left:auto}
  .navbtn:hover{background:rgba(255,255,255,.26);transform:translateY(-1px)}
  .navbtn svg{width:15px;height:15px;flex:none}
  .kpis{display:flex;gap:12px;flex-wrap:wrap}
  .kpi{background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:10px;padding:7px 15px;text-align:center}
  .kpi .v{font-size:20px;font-weight:700;font-family:var(--mono);line-height:1.1}
  .kpi .l{font-size:10px;text-transform:uppercase;letter-spacing:.7px;opacity:.8}

  .filterbar{background:var(--panel);border-bottom:1px solid var(--linea);padding:10px 22px;display:flex;align-items:center;gap:12px 18px;flex-wrap:wrap}
  .fgroup{display:flex;align-items:center;gap:8px}
  .tit{font-size:11.5px;color:var(--gris);text-transform:uppercase;letter-spacing:.7px;font-weight:600}
  .rail{display:flex;border:1px solid var(--linea);border-radius:9px;overflow:hidden}
  .rail button{border:none;background:#fff;padding:7px 12px;font-size:12.5px;font-weight:600;color:var(--gris);cursor:pointer;border-right:1px solid var(--linea);font-family:var(--mono);transition:background .15s,color .15s}
  .rail button:last-child{border-right:none}
  .rail button:hover{background:#f0f6f2}
  .rail button.act{background:var(--verde);color:#fff}
  select{padding:7px 11px;border:1px solid var(--linea);border-radius:8px;font-size:13px;font-family:var(--sans);background:#fff}
  select:focus{outline:2px solid var(--azul);outline-offset:-1px}
  .search{flex:1;min-width:180px}
  .search input{width:100%;padding:7px 11px;border:1px solid var(--linea);border-radius:8px;font-size:13px}
  .search input:focus{outline:2px solid var(--azul);outline-offset:-1px}
  .btn-reset{border:1px solid var(--linea);background:#fff;border-radius:8px;padding:7px 13px;font-size:12.5px;font-weight:600;color:var(--gris);cursor:pointer}
  .btn-reset:hover{background:#f4f8fb}

  .tablewrap{flex:1;overflow:auto;background:var(--panel)}
  table{border-collapse:collapse;font-size:12.5px;white-space:nowrap}
  thead th{position:sticky;top:0;background:var(--azul);color:#fff;font-weight:600;padding:9px 11px;text-align:left;cursor:pointer;user-select:none;z-index:3;border-right:1px solid rgba(255,255,255,.12)}
  thead th:hover{background:#2a5d8f}
  thead th .ar{font-size:9px;opacity:.6;margin-left:3px}
  thead th.num{text-align:right}
  tbody td{padding:7px 11px;border-bottom:1px solid #eef1f5}
  tbody td.num{text-align:right;font-family:var(--mono)}
  tbody tr:hover{background:#f4f8fb}
  tbody tr:nth-child(even){background:#fafbfd}
  tbody tr:nth-child(even):hover{background:#f4f8fb}
  /* columnas fijas: estudiante (1a) */
  .est{font-weight:600;position:sticky;left:0;background:inherit;z-index:2;min-width:230px;box-shadow:1px 0 0 var(--linea)}
  thead th.est{z-index:4}
  .ce{color:var(--gris);max-width:230px;overflow:hidden;text-overflow:ellipsis}
  .badge{display:inline-block;border-radius:6px;padding:2px 9px;font-weight:700;font-size:11.5px;font-family:var(--mono);color:#1c2733}
  .niv{display:inline-block;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:600}
  .niv-e{background:#E3F0FA;color:#1F4E78} .niv-r{background:#FCEFD9;color:#9a7b1a}
  .pcell{font-family:var(--mono);text-align:right}
  .ne{font-family:var(--mono);font-weight:700;text-align:right}
  .empty{padding:40px;text-align:center;color:var(--gris);font-size:14px}
  .foot{padding:6px 22px;background:var(--panel);border-top:1px solid var(--linea);font-size:11.5px;color:var(--gris)}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>

const RANGOS = ['Todos','≥50','≥60','≥70','≥80'];
const GORD = ['<50','≥50','≥60','≥70','≥80'];
const FILL = {'<50':'#F8696B','≥50':'#FFD166','≥60':'#FFEB84','≥70':'#A9D27F','≥80':'#63BE7B'};
let fRango=0, fNivel='', fCentro='', q='', sortCol='est', sortDir=1;

const COLS=[
  ['est','Estudiante','txt',r=>r.est],
  ['nie','NIE','num',r=>r.nie],
  ['cod','Código','num',r=>r.cod],
  ['ce','Centro educativo','txt',r=>r.ce],
  ['niv','Nivel','niv',r=>r.niv],
  ['cat','Categoría técnica','txt',r=>r.cat],
  ['cri','Criterio','txt',r=>r.cri],
  ['p1','P1','p',r=>r.p[0]],['p2','P2','p',r=>r.p[1]],['p3','P3','p',r=>r.p[2]],
  ['p4','P4','p',r=>r.p[3]],['p5','P5','p',r=>r.p[4]],['p6','P6','p',r=>r.p[5]],
  ['p7','P7','p',r=>r.p[6]],['p8','P8','p',r=>r.p[7]],['p9','P9','p',r=>r.p[8]],
  ['ne','Nota est.','ne',r=>r.ne],
  ['g','Grupo','grp',r=>r.g],
];

const centros=[...new Set(DATA.map(r=>r.ce))].sort((a,b)=>a.localeCompare(b));
const selce=document.getElementById('fce');
centros.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c.length>42?c.slice(0,42)+'…':c;selce.appendChild(o);});

const rail=document.getElementById('rail');
RANGOS.forEach((f,i)=>{const b=document.createElement('button');b.textContent=f;if(i===0)b.classList.add('act');
  b.onclick=()=>{fRango=i;rail.querySelectorAll('button').forEach((x,j)=>x.classList.toggle('act',j===i));render();};rail.appendChild(b);});

const thead=document.getElementById('thead');
COLS.forEach(([k,lab,tipo])=>{const th=document.createElement('th');th.textContent=lab;
  if(tipo==='num'||tipo==='p'||tipo==='ne')th.classList.add('num');
  if(k==='est')th.classList.add('est');
  th.dataset.k=k; th.innerHTML+=' <span class="ar" id="ar-'+k+'"></span>';
  th.onclick=()=>{if(sortCol===k)sortDir*=-1;else{sortCol=k;sortDir=1;}render();};thead.appendChild(th);});

function gi(r){return GORD.indexOf(r.g);}
function filtra(){
  return DATA.filter(r=>{
    if(fRango>0 && gi(r)<(fRango)) return false; // RANGOS[1]=≥50 -> GORD idx1
    if(fNivel && r.niv!==fNivel) return false;
    if(fCentro && r.ce!==fCentro) return false;
    if(q && !((r.est+' '+r.nie+' '+r.ce).toLowerCase().includes(q))) return false;
    return true;
  });
}
function pColor(v){
  const t=Math.max(0,Math.min(1,(v-30)/55));
  let cr,cg,cb;
  if(t<0.5){const u=t/0.5;cr=248;cg=Math.round(105+130*u);cb=Math.round(107+25*u);}
  else{const u=(t-0.5)/0.5;cr=Math.round(248-149*u);cg=Math.round(235-45*u);cb=Math.round(132-9*u);}
  return `rgb(${cr},${cg},${cb})`;
}
function render(){
  let rows=filtra();
  const acc=Object.fromEntries(COLS.map(c=>[c[0],c[3]]));
  rows.sort((a,b)=>{let va=acc[sortCol](a),vb=acc[sortCol](b);
    if(sortCol==='g'){va=gi(a);vb=gi(b);}
    if(va===null)va=-Infinity;if(vb===null)vb=-Infinity;
    if(typeof va==='string')return sortDir*va.localeCompare(vb);
    return sortDir*(va-vb);});
  COLS.forEach(([k])=>{const ar=document.getElementById('ar-'+k);if(ar)ar.textContent=sortCol===k?(sortDir>0?'▲':'▼'):'';});
  const tb=document.getElementById('tbody');tb.innerHTML='';
  const frag=document.createDocumentFragment();
  rows.forEach(r=>{
    const tr=document.createElement('tr');
    COLS.forEach(([k,lab,tipo,fn])=>{
      const td=document.createElement('td');const v=fn(r);
      if(k==='est')td.className='est';
      else if(k==='ce')td.className='ce';
      else if(tipo==='num')td.className='num';
      if(tipo==='p'){ td.className='pcell';
        if(v===null){td.textContent='—';td.style.color='#c8d1da';}
        else{td.textContent=v.toFixed(1);td.style.background=pColor(v);} }
      else if(tipo==='ne'){ td.className='ne'; td.textContent=v.toFixed(1); td.style.background=pColor(v); }
      else if(k==='niv'){ td.innerHTML=`<span class="niv niv-${v==='Reserva'?'r':'e'}">${v}</span>`; }
      else if(k==='g'){ td.innerHTML=`<span class="badge" style="background:${FILL[v]}">${v}</span>`; }
      else if(tipo==='txt'){td.textContent=v;td.title=v;}
      else td.textContent=v===null?'—':v;
      tr.appendChild(td);
    });
    frag.appendChild(tr);
  });
  tb.appendChild(frag);
  document.getElementById('empty').style.display=rows.length?'none':'block';
  document.getElementById('kRows').textContent=rows.length.toLocaleString('es-SV');
  document.getElementById('kNota').textContent=rows.length?(rows.reduce((a,r)=>a+r.ne,0)/rows.length).toFixed(1):'—';
  document.getElementById('foot').textContent=`${rows.length.toLocaleString('es-SV')} de ${DATA.length.toLocaleString('es-SV')} estudiantes`+
    (fRango>0?` · ${RANGOS[fRango]}`:'')+(fNivel?` · ${fNivel}`:'')+(fCentro?` · ${fCentro}`:'');
}
document.getElementById('fnivel').addEventListener('change',e=>{fNivel=e.target.value;render();});
document.getElementById('fce').addEventListener('change',e=>{fCentro=e.target.value;render();});
document.getElementById('busca').addEventListener('input',e=>{q=e.target.value.trim().toLowerCase();render();});
document.getElementById('reset').addEventListener('click',()=>{fRango=0;fNivel='';fCentro='';q='';
  rail.querySelectorAll('button').forEach((x,j)=>x.classList.toggle('act',j===0));
  document.getElementById('fnivel').value='';document.getElementById('fce').value='';document.getElementById('busca').value='';render();});
render();
</script>
